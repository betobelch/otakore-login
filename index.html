<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Otakore - Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital@1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      background: #000f08;
    }

    .container {
      display: flex;
      min-height: 100vh;
    }

    
    .form-side {
      flex: 1;
      padding: 40px 60px;
      display: flex;
      flex-direction: column;
      background: #000f08;
      position: relative;
    }

    .form-side::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at bottom, rgba(180, 130, 180, 0.15) 0%, transparent 70%);
      pointer-events: none;
    }

    /* Logo */
    .logo {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: 28px;
      color: #C200FB;
      margin-bottom: 60px;
      position: relative;
      z-index: 1;
    }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      position: absolute;
      top: 40px;
      left: 60px;
      right: 60px;
    }

    .signin-link {
      color: #C200FB;
      font-size: 14px;
      text-decoration: none;
    }

    .signin-link span {
      color: #C200FB;
      text-decoration: underline;
      margin-left: 4px;
    }

    .signin-link:hover span {
      color: #C200FB;
    }

    /* Form Content */
    .form-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 380px;
      position: relative;
      z-index: 1;
    }

    .form-title {
      font-size: 24px;
      font-weight: 500;
      color: #C200FB;
      margin-bottom: 8px;
    }

    .form-subtitle {
      font-size: 13px;
      color: #C200FB;
      margin-bottom: 30px;
    }

    .form-subtitle a {
      color: #C200FB;
      text-decoration: underline;
    }

    /* Google Button */
    .google-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #9303C5 0%, #02060E 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .google-btn:hover {
      transform: translateY(-2px);
      box-shadow: linear-gradient(135deg, #9303C5 0%, #02060E 100%));
    }

    .google-btn svg {
      width: 20px;
      height: 20px;
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      margin: 25px 0;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: rgba(255, 255, 255, 0.15);
    }

    .divider-text {
      padding: 0 20px;
      color: #7a6a77;
      font-size: 13px;
    }

    /* Form Inputs */
    .form-group {
      margin-bottom: 20px;
    }

    .form-input {
      width: 100%;
      padding: 14px 0;
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      color: #e8d5e0;
      font-size: 14px;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.3s;
    }

    .form-input::placeholder {
      color: #7a6a77;
    }

    .form-input:focus {
      outline: none;
      border-bottom-color: rgba(224, 122, 95, 0.6);
    }

    /* Submit Button */
    .submit-btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(135deg, #9303C5 0%, #02060E 100%);
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 10px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 25px rgba(212, 114, 122, 0.4);
    }

    /* Right Side - Imagem */
    .image-side {
      flex: 1.2;
      position: relative;
      overflow: hidden;
    }

    .image-side img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
    }

    .image-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100px;
      height: 100%;
      background: linear-gradient(90deg, rgba(45, 35, 66, 0.8) 0%, transparent 100%);
    }

    /* Responsividade */
    @media (max-width: 900px) {
      .image-side {
        display: none;
      }

      .form-side {
        padding: 40px 30px;
      }

      .header {
        left: 30px;
        right: 30px;
      }
    }

    @media (max-width: 500px) {
      .form-side {
        padding: 30px 20px;
      }

      .header {
        left: 20px;
        right: 20px;
        flex-direction: column;
        gap: 20px;
      }

      .form-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Left Side - Form -->
    <div class="form-side">
      <div class="header">
        <div class="logo">Otakore</div>
        <a href="#" class="signin-link">Ja tem uma conta?<span>Sign in</span></a>
      </div>

      <div class="form-content">
        <h1 class="form-title">Vamos começar!</h1>
        <p class="form-subtitle">
          Ao me cadastrar, concordo com os termos da Otakore. <a href="#">Termos</a> & <a href="#">Politica de Privacidade</a>
        </p>

        <button class="google-btn" id="googleBtn">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Logar usando conta Google
        </button>

        <div class="divider">
          <div class="divider-line"></div>
          <span class="divider-text">ou</span>
          <div class="divider-line"></div>
        </div>

        <form id="signupForm">
          <div class="form-group">
            <input type="email" class="form-input" placeholder="Ensira um endereço de email" required id="email">
          </div>
          <div class="form-group">
            <input type="text" class="form-input" placeholder="Ensira um nome" required id="username">
          </div>
          <div class="form-group">
            <input type="password" class="form-input" placeholder="Ensira uma senha" required id="password">
          </div>
          <div class="form-group">
            <input type="password" class="form-input" placeholder="Confirme a Senha" required id="confirmPassword">
          </div>
          <button type="submit" class="submit-btn">Sign Up</button>
        </form>
      </div>
    </div>

    <!-- Right Side - Imagem -->
    <div class="image-side">
      <img src="/anime-girl-dark.jpg" alt="Ilustração de garota de Anime">
      <div class="image-overlay"></div>
    </div>
  </div>

  <script>
    // Form validation
    const form = document.getElementById('signupForm');
    const password = document.getElementById('password');
    const confirmPassword = document.getElementById('confirmPassword');
    const googleBtn = document.getElementById('googleBtn');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Checar se a senha esta correta
      if (password.value !== confirmPassword.value) {
        alert('As senhas não coincidem!');
        return;
      }

      // Checar se a senha é forte
      if (password.value.length < 6) {
        alert('A senha deve ter pelo menos 6 caracteres!');
        return;
      }

      // Obtenha dados do formulário
      const formData = {
        email: document.getElementById('email').value,
        username: document.getElementById('username').value,
        password: password.value
      };

      console.log('Form submitted:', formData);
      alert('Cadastro realizado com sucesso!');
      
      // Redefinir formulário
      form.reset();
    });

    // Click no botão Google
    googleBtn.addEventListener('click', function() {
      alert('Redirecionando para login com Google...');
    });

    // Adiciona efeitos de foco de input
    const inputs = document.querySelectorAll('.form-input');
    inputs.forEach(input => {
      input.addEventListener('focus', function() {
        this.parentElement.classList.add('focused');
      });
      
      input.addEventListener('blur', function() {
        this.parentElement.classList.remove('focused');
      });
    });
  </script>
</body>
</html>
